services:
  - type: web
    name: comment-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_server:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: AI_API_BASE
        value: https://api.siliconflow.cn/v1
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: Qwen/Qwen2.5-7B-Instruct
      - key: PYTHON_VERSION
        value: "3.11.0"
